<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get in touch · UXmikko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Inter:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .contact-wrap {
      width: 100%; padding: 104px 10px 10px;
    }
    .contact-card {
      background: linear-gradient(180deg, rgb(240,243,245) 0%, white 100%);
      border-radius: 48px;
      padding: 120px 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    .contact-intro { display: flex; flex-direction: column; gap: 24px; }
    .contact-heading {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 700; line-height: 1.1em;
      color: var(--text-1);
    }
    .contact-sub {
      font-family: var(--font-body);
      font-size: 17px; line-height: 1.7em;
      color: var(--text-2);
    }
    .contact-links { display: flex; flex-direction: column; gap: 12px; }
    .contact-link {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-body); font-size: 15px;
      color: var(--text-2); transition: color 0.15s;
    }
    .contact-link:hover { color: var(--text-1); }
    .contact-form {
      background: white;
      border-radius: 32px;
      padding: 48px;
      box-shadow: var(--shadow-card);
      display: flex; flex-direction: column; gap: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label {
      font-family: var(--font-body); font-size: 13px;
      font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-3);
    }
    .form-input, .form-textarea {
      font-family: var(--font-body); font-size: 15px;
      color: var(--text-1);
      background: rgb(248,249,250);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      resize: none;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: rgb(43,116,148);
      box-shadow: 0 0 0 3px rgba(43,116,148,0.1);
    }
    .form-textarea { min-height: 140px; }
    .form-submit {
      height: 52px;
      background: var(--text-1); color: white;
      font-family: var(--font-display); font-size: 16px; font-weight: 600;
      border: none; border-radius: 14px;
      cursor: pointer; width: 100%;
      transition: background 0.15s;
    }
    .form-submit:hover { background: rgb(50,55,60); }

    @media (max-width: 680px) {
      .contact-card { grid-template-columns: 1fr; padding: 60px 28px; gap: 48px; }
    }
  </style>
</head>
<body>
<div class="page">

  <nav class="nav">
    <div class="nav-inner">
      <a href="../" class="nav-logo">
        <div class="nav-logo-mark">M</div>
        UXmikko
      </a>
      <div class="nav-links">
        <a href="../" class="nav-back">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back
        </a>
      </div>
    </div>
  </nav>

  <div class="contact-wrap">
    <div class="contact-card">

      <div class="contact-intro">
        <h1 class="contact-heading">Let's talk.</h1>
        <p class="contact-sub">Open to senior and staff product design roles globally. Also happy to chat about work, collaboration, or anything in the UX space.</p>
        <div class="contact-links">
          <a class="contact-link" href="mailto:uxmikko@gmail.com">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.25"/><path d="M2 5.5l6 4 6-4" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
            uxmikko@gmail.com
          </a>
          <a class="contact-link" href="https://linkedin.com/in/uxmikko" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.25"/><path d="M5 7v4M5 5v.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><path d="M8 11V8.5C8 7.67 8.67 7 9.5 7S11 7.67 11 8.5V11" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
            linkedin.com/in/uxmikko
          </a>
        </div>
      </div>

      <form class="contact-form" action="https://formspree.io/f/xykngwry" method="POST">
        <div class="form-group">
          <label class="form-label" for="name">Name</label>
          <input class="form-input" id="name" type="text" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" id="email" type="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="message">Message</label>
          <textarea class="form-textarea" id="message" name="message" placeholder="What's on your mind?" required></textarea>
        </div>
        <button class="form-submit" type="submit">Send message</button>
      </form>

    </div>
  </div>

</div>
</body>
</html>
